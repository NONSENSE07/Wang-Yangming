<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王阳明 · 此心光明</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" onload="document.documentElement.classList.add('fonts-loaded')">
<style>
/* ========== CSS VARIABLES & THEMES ========== */
:root {
  --transition-speed: 0.6s;
  --font-title: 'Ma Shan Zheng', cursive;
  --font-body: 'Noto Serif SC', 'SimSun', serif;
  --font-deco: 'ZCOOL XiaoWei', serif;

  /* 色彩体系 — 宣纸·墨·朱砂 */
  --bg-primary: #141218;
  --bg-secondary: #1c1926;
  --bg-card: rgba(28, 25, 38, 0.88);
  --bg-overlay: rgba(8, 6, 12, 0.8);

  --text-primary: #e6ddd0;
  --text-secondary: #bfb09a;
  --text-muted: #7d7168;

  --accent: #bf3b2e;
  --accent-glow: rgba(191, 59, 46, 0.35);
  --accent-gold: #c9a24c;
  --accent-gold-dim: rgba(201, 162, 76, 0.15);

  --border-color: rgba(180, 160, 130, 0.18);
  --border-color-strong: rgba(180, 160, 130, 0.3);
  --quote-bg: rgba(191, 59, 46, 0.06);
  --quote-border: #bf3b2e;
  --paper: #f5f0e8;
  --ink: #2c2420;
  --particle-color: rgba(180, 160, 120, 0.12);
  --seal-color: #bf3b2e;

  /* 阴影系统 */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px var(--accent-glow);
}

/* ========== BASE STYLES ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.9;
  overflow-x: hidden;
  transition: background var(--transition-speed), color var(--transition-speed);
  min-height: 100vh;
}

/* ========== CANVAS BACKGROUND ========== */
#particle-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.7;
}

/* ========== LAYOUT ========== */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* ========== THEME SWITCHER ========== */
.theme-switcher {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 7px 14px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--text-muted);
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  display: flex; align-items: center; gap: 6px;
  letter-spacing: 0.05em;
}
.theme-switcher:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
.theme-switcher .icon { font-size: 1rem; }

/* ========== PROGRESS BAR ========== */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-gold));
  z-index: 1001;
  transition: width 0.5s ease;
  width: 0%;
  box-shadow: 0 0 8px var(--accent-glow);
}

/* ========== TITLE SCREEN ========== */
.title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
  opacity: 1;
  transition: opacity 1s ease;
  position: relative;
  background:
    radial-gradient(ellipse 60% 50% at 50% 55%, rgba(201,162,76,0.04) 0%, transparent 70%);
}
.title-screen.hidden { opacity: 0; pointer-events: none; position: absolute; inset: 0; }

.title-bg-text {
  position: absolute;
  font-family: var(--font-title);
  font-size: clamp(6rem, 20vw, 15rem);
  color: var(--text-primary);
  opacity: 0.025;
  letter-spacing: 0.3em;
  user-select: none;
  pointer-events: none;
}

.title-main {
  font-family: var(--font-title);
  font-size: clamp(2.5rem, 8vw, 5rem);
  color: var(--text-primary);
  letter-spacing: 0.2em;
  margin-bottom: 1rem;
  animation: titleFadeIn 2s ease-out;
  text-shadow: 0 0 40px rgba(201,162,76,0.08);
}

.title-sub {
  font-family: var(--font-body);
  font-size: clamp(0.9rem, 2.5vw, 1.15rem);
  color: var(--text-secondary);
  letter-spacing: 0.15em;
  margin-bottom: 3rem;
  animation: titleFadeIn 2s ease-out 0.5s both;
  font-weight: 400;
}

.title-divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  margin-bottom: 3rem;
  animation: titleFadeIn 2s ease-out 0.8s both;
}

.title-seal {
  width: 80px; height: 80px;
  border: 2.5px solid var(--seal-color);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-title);
  color: var(--seal-color);
  font-size: 1.5rem;
  transform: rotate(-5deg);
  margin-bottom: 2rem;
  animation: titleFadeIn 2s ease-out 0.3s both;
  position: relative;
  opacity: 0.8;
  box-shadow: 0 0 20px rgba(191,59,46,0.08);
}
.title-seal::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid var(--seal-color);
  border-radius: 3px;
  opacity: 0.4;
}

.title-buttons {
  display: flex;
  gap: 1.5rem;
  animation: titleFadeIn 2s ease-out 1s both;
}

.btn {
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 11px 32px;
  border: 1px solid var(--border-color);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.35s ease;
  letter-spacing: 0.12em;
  background: transparent;
  color: var(--text-primary);
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.35s;
}
.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 24px var(--accent-glow);
  transform: translateY(-1px);
}
.btn:active { transform: translateY(0); }
.btn-primary {
  background: var(--accent);
  color: #f5f0e8;
  border-color: var(--accent);
  letter-spacing: 0.15em;
}
.btn-primary:hover {
  background: transparent;
  color: var(--accent);
}

/* ========== CHAPTER CONTAINER ========== */
#chapter-view {
  display: none;
  min-height: 100vh;
  padding: 2rem 1.5rem;
  max-width: 780px;
  margin: 0 auto;
}

#chapter-view.active {
  display: block;
  animation: chapterTransition 0.6s ease-out;
}

.chapter-header {
  text-align: center;
  padding: 4rem 0 2.5rem;
  animation: fadeInUp 0.8s ease-out;
}

.chapter-number {
  font-family: var(--font-deco);
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}

.chapter-title {
  font-family: var(--font-title);
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  color: var(--text-primary);
  letter-spacing: 0.15em;
  margin-bottom: 0.6rem;
}

.chapter-era {
  font-size: 0.85rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
}

.chapter-divider {
  width: 40px;
  height: 1px;
  background: var(--accent-gold);
  margin: 1.2rem auto 0;
  opacity: 0.5;
}

/* ========== CHAPTER ILLUSTRATION ========== */
.chapter-illustration {
  display: flex;
  justify-content: center;
  margin: 1.5rem 0 2rem;
  opacity: 0;
  animation: fadeInUp 1s ease-out 0.4s forwards;
}
.chapter-illustration svg {
  width: 100%;
  max-width: 600px;
  height: auto;
  border-radius: 8px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(180,160,130,0.06);
}

.chapter-illustration .ink-bg {
  fill: var(--bg-secondary);
  transition: fill var(--transition-speed);
}

/* ========== SCENE IMAGE (page decoration) ========== */
.scene-image {
  margin: 1.5rem auto;
  text-align: center;
  opacity: 0.85;
  transition: opacity 0.4s;
}
.scene-image svg {
  max-width: 100%;
  border-radius: 6px;
  box-shadow: 0 1px 12px rgba(0,0,0,0.15);
}

/* ========== NARRATIVE TEXT ========== */
.scene-content {
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

.narrative-block {
  margin-bottom: 1.8rem;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s, transform 0.6s;
}
.narrative-block.visible {
  opacity: 1;
  transform: translateY(0);
}

.narrative-text {
  font-size: 1.02rem;
  line-height: 2.1;
  color: var(--text-primary);
  text-align: justify;
}

.narrative-text .highlight {
  color: var(--accent);
  font-weight: 700;
}

.narrative-text .emphasis {
  border-bottom: 1.5px solid var(--accent-gold);
  padding-bottom: 2px;
}

/* ========== QUOTE BLOCK ========== */
.quote-block {
  position: relative;
  margin: 2.2rem 0;
  padding: 1.4rem 1.8rem 1.4rem 2rem;
  background: linear-gradient(135deg, var(--quote-bg), rgba(201,162,76,0.03));
  border-left: 3px solid var(--quote-border);
  border-radius: 0 4px 4px 0;
  animation: fadeInUp 0.8s ease-out 0.3s both;
  box-shadow: var(--shadow-sm);
}

.quote-text {
  font-size: 1.05rem;
  line-height: 2.1;
  color: var(--text-primary);
  font-style: italic;
  letter-spacing: 0.04em;
}

.quote-source {
  margin-top: 0.8rem;
  font-size: 0.82rem;
  color: var(--text-muted);
  text-align: right;
  letter-spacing: 0.05em;
}

.quote-note {
  margin-top: 0.6rem;
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.7;
  border-top: 1px solid var(--border-color);
  padding-top: 0.5rem;
  opacity: 0.75;
}

.quote-block::after {
  content: '引';
  position: absolute;
  top: -1px; right: 10px;
  font-family: var(--font-title);
  font-size: 2.2rem;
  color: var(--seal-color);
  opacity: 0.1;
  line-height: 1;
}

/* ========== CHOICE BLOCK ========== */
.choice-block {
  margin: 2.5rem 0;
  animation: fadeInUp 0.8s ease-out 0.3s both;
}

.choice-prompt {
  font-size: 1.02rem;
  color: var(--text-secondary);
  margin-bottom: 1.2rem;
  padding-left: 1rem;
  border-left: 2px solid var(--accent-gold);
  line-height: 1.8;
}

.choice-options {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}

.choice-btn {
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 0.9rem 1.3rem;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 3px;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: left;
  line-height: 1.7;
}
.choice-btn:hover {
  border-color: var(--accent);
  transform: translateX(5px);
  box-shadow: var(--shadow-glow);
  background: rgba(191, 59, 46, 0.05);
}
.choice-btn.selected {
  border-color: var(--accent);
  background: rgba(191, 59, 46, 0.08);
  box-shadow: inset 0 0 0 1px var(--accent);
}

.choice-feedback {
  margin-top: 1rem;
  padding: 1rem 1.4rem;
  background: var(--bg-card);
  border-left: 3px solid var(--accent-gold);
  border-radius: 0 4px 4px 0;
  color: var(--text-secondary);
  font-size: 0.92rem;
  line-height: 1.9;
  animation: fadeInUp 0.5s ease-out;
  display: none;
}
.choice-feedback.show { display: block; }

/* ========== UNIFIED NAV (page + chapter merged) ========== */
.unified-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border-color);
  gap: 1rem;
}

.nav-btn {
  font-family: var(--font-body);
  font-size: 0.88rem;
  padding: 9px 22px;
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 3px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--shadow-glow);
  transform: translateY(-1px);
}
.nav-btn:disabled {
  opacity: 0.25;
  cursor: default;
  border-color: var(--border-color);
  color: var(--text-muted);
  box-shadow: none;
  transform: none;
}

.nav-dots {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  flex: 1;
}

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--border-color-strong);
  background: transparent;
  cursor: pointer;
  transition: all 0.35s ease;
  flex-shrink: 0;
}
.nav-dot.active {
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
}
.nav-dot:hover:not(.active) { border-color: var(--text-muted); }

.nav-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.nav-page-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  font-family: var(--font-deco);
}

.chapter-indicator {
  font-size: 0.82rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  font-family: var(--font-deco);
}

.page-content {
  animation: pageFadeIn 0.45s ease-out;
}
.page-content.fade-out {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
@keyframes pageFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== TIMELINE SIDEBAR ========== */
.timeline-toggle {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 999;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 1.1rem;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  box-shadow: var(--shadow-md);
}
.timeline-toggle:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

.timeline-panel {
  position: fixed;
  bottom: 70px; left: 20px;
  width: 260px;
  max-height: 55vh;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 1rem;
  backdrop-filter: blur(14px);
  overflow-y: auto;
  z-index: 998;
  display: none;
  animation: fadeInUp 0.3s ease-out;
  box-shadow: var(--shadow-lg);
}
.timeline-panel.open { display: block; }

.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 0.7rem;
  padding: 0.45rem 0;
  cursor: pointer;
  opacity: 0.45;
  transition: all 0.3s ease;
}
.timeline-item:hover { opacity: 0.75; }
.timeline-item.active { opacity: 1; }
.timeline-item.visited { opacity: 0.6; }
.timeline-item.current { opacity: 1; }

.timeline-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--border-color-strong);
  background: transparent;
  flex-shrink: 0;
  margin-top: 6px;
  transition: all 0.3s;
}
.timeline-item.active .timeline-dot,
.timeline-item.current .timeline-dot {
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
}

.timeline-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  line-height: 1.4;
}
.timeline-label .tl-title { font-weight: 700; color: var(--text-primary); }
.timeline-label .tl-year { color: var(--text-muted); }

/* ========== INTERACTIVE SCENES ========== */
.interactive-container {
  margin: 2rem 0;
  padding: 2rem;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  text-align: center;
  animation: fadeInUp 0.8s ease-out;
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(8px);
}

.interactive-title {
  font-family: var(--font-title);
  font-size: 1.4rem;
  color: var(--accent);
  margin-bottom: 0.8rem;
  letter-spacing: 0.15em;
}

.interactive-instruction {
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  line-height: 1.7;
}

/* -- Bamboo Scene -- */
.bamboo-scene {
  position: relative;
  width: 200px; height: 350px;
  margin: 1rem auto;
  cursor: pointer;
  transition: opacity 2s ease-out, transform 2s ease-out;
}
.bamboo-scene .bamboo-stalk {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 8px;
  background: linear-gradient(to top, #2d5016, #4a7c2e);
  border-radius: 4px;
  height: 100%;
  transition: all 0.5s;
}
.bamboo-scene .bamboo-node {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 14px; height: 4px;
  background: #3a6b1e;
  border-radius: 2px;
}
.bamboo-scene .bamboo-leaf {
  position: absolute;
  width: 40px; height: 12px;
  background: #4a7c2e;
  border-radius: 0 60% 0 60%;
  transform-origin: left center;
  animation: leafSway 3s ease-in-out infinite;
  transition: all 1s;
}
.bamboo-scene .bamboo-leaf:nth-child(2) { animation-delay: -1s; }
.bamboo-scene .bamboo-leaf:nth-child(3) { animation-delay: -2s; }

.bamboo-word {
  position: absolute;
  font-size: 0.9rem;
  color: var(--text-secondary);
  opacity: 0;
  animation: floatWord 2s ease-out forwards;
  pointer-events: none;
}

.bamboo-timer {
  font-family: var(--font-deco);
  font-size: 2rem;
  color: var(--accent);
  margin: 1rem 0;
}
.bamboo-timer.danger { color: #e74c3c; }

.bamboo-status {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-top: 0.5rem;
  min-height: 1.5em;
}

/* -- Longchang Enlightenment -- */
.longchang-scene {
  position: relative;
  width: 100%;
  height: 400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-radius: 6px;
}

.breath-circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 1.5px solid var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(180,160,120,0.04);
}
.breath-circle.inhale {
  border-color: var(--accent);
  box-shadow: 0 0 30px var(--accent-glow);
}
.breath-circle.hold {
  border-color: var(--accent-gold);
  box-shadow: 0 0 40px var(--accent-glow);
}
.breath-circle.exhale {
  border-color: var(--accent-gold);
  box-shadow: 0 0 10px rgba(201,162,76,0.12);
}

.breath-text {
  font-size: 1.1rem;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
}

.enlightenment-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #fff, #f5f0e8, transparent);
  opacity: 0;
  z-index: 2000;
  pointer-events: none;
  transition: opacity 0.5s;
}
.enlightenment-flash.active {
  animation: flashBright 3s ease-out forwards;
}

.enlightenment-text {
  font-family: var(--font-title);
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  color: var(--text-primary);
  text-align: center;
  opacity: 0;
  letter-spacing: 0.15em;
}
.enlightenment-text.show {
  animation: revealText 2s ease-out forwards;
}

/* -- Battle Map -- */
.battle-scene {
  position: relative;
  padding: 0.5rem 1rem;
  min-height: 260px;
}

.battle-phase {
  margin-bottom: 0;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.5s;
  display: none;
}
.battle-phase.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.battle-phase-title {
  font-family: var(--font-title);
  font-size: 1.2rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
}

.battle-situation {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  line-height: 1.8;
}

.battle-result {
  margin-top: 1rem;
  padding: 1rem;
  background: var(--quote-bg);
  border-radius: 4px;
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.8;
  display: none;
}
.battle-result.show { display: block; animation: fadeInUp 0.5s; }

.battle-placeholder {
  margin-top: 1rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.82rem;
  letter-spacing: 0.15em;
  opacity: 0.55;
  transition: opacity 0.4s;
}
.battle-placeholder.hidden { opacity: 0; }

.battle-progress {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 1.2rem;
}
.battle-progress-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid var(--accent-gold);
  background: transparent;
  transition: all 0.4s ease;
}
.battle-progress-dot.done {
  background: var(--accent-gold);
  box-shadow: 0 0 8px rgba(201,162,76,0.3);
}
.battle-progress-dot.current {
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 1.5s ease-in-out infinite;
}
.battle-phase-counter {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 0.8rem;
}

/* -- Mirror Scene -- */
.mirror-scene {
  position: relative;
  padding: 1rem;
}

.mirror-container {
  position: relative;
  width: 180px; height: 180px;
  margin: 1.5rem auto;
  border-radius: 50%;
  border: 2.5px solid var(--accent-gold);
  overflow: hidden;
  background: var(--bg-secondary);
  box-shadow: 0 0 30px rgba(201,162,76,0.08);
}

.mirror-fog {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 40%, rgba(160,155,148,0.5), rgba(100,95,88,0.7));
  transition: opacity 1s;
}

.mirror-clear {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, transparent 60%, rgba(201,162,76,0.08));
  opacity: 0;
  transition: opacity 0.8s;
}
.mirror-clear.revealed { opacity: 1; }

.mirror-reflection {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-title);
  font-size: 1.2rem;
  color: var(--accent-gold);
  opacity: 0;
  transition: opacity 1s;
}
.mirror-reflection.show { opacity: 1; }

.mirror-scenario {
  margin-bottom: 1.5rem;
}
.mirror-scenario-text {
  font-size: 0.95rem;
  color: var(--text-primary);
  margin-bottom: 1rem;
  line-height: 1.9;
}

.mirror-progress {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin: 1rem 0;
}
.mirror-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--border-color-strong);
  background: transparent;
  transition: all 0.3s;
}
.mirror-dot.done { background: var(--accent-gold); border-color: var(--accent-gold); box-shadow: 0 0 6px rgba(201,162,76,0.3); }

/* -- Ending Scene -- */
.ending-scene {
  padding: 2rem 0;
}

.ending-review {
  margin-bottom: 2rem;
}

.review-item {
  display: flex;
  gap: 1rem;
  padding: 0.9rem 0;
  border-bottom: 1px solid var(--border-color);
  font-size: 0.88rem;
}
.review-chapter { color: var(--text-muted); min-width: 110px; }
.review-choice { color: var(--text-primary); }
.review-comment { color: var(--accent); font-size: 0.82rem; margin-top: 0.3rem; }

.ending-score {
  text-align: center;
  margin: 2rem 0;
}
.score-label {
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}
.score-value {
  font-family: var(--font-title);
  font-size: 3rem;
  color: var(--accent);
  text-shadow: 0 0 30px var(--accent-glow);
}
.score-name {
  font-size: 1.05rem;
  color: var(--text-secondary);
  margin-top: 0.4rem;
  letter-spacing: 0.15em;
}

.ending-text {
  max-width: 580px;
  margin: 2rem auto;
  padding: 2rem;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  text-align: center;
  box-shadow: var(--shadow-md);
}
.ending-text p {
  font-size: 1rem;
  line-height: 2;
  color: var(--text-primary);
  margin-bottom: 1rem;
}

.final-quote {
  font-family: var(--font-title);
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--accent-gold);
  text-align: center;
  padding: 2rem 0;
  letter-spacing: 0.25em;
  text-shadow: 0 0 30px rgba(201,162,76,0.1);
}

.restart-btn {
  display: block;
  margin: 2rem auto;
}

/* ========== ANIMATIONS ========== */
@keyframes titleFadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes leafSway {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(5deg); }
  75% { transform: rotate(-5deg); }
}

@keyframes floatWord {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}

@keyframes breathInhale {
  0% { transform: scale(1); }
  100% { transform: scale(1.5); }
}

@keyframes breathExhale {
  0% { transform: scale(1.5); }
  100% { transform: scale(1); }
}

@keyframes flashBright {
  0% { opacity: 0; }
  15% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes revealText {
  0% { opacity: 0; letter-spacing: 0.5em; }
  100% { opacity: 1; letter-spacing: 0.15em; }
}

@keyframes chapterTransition {
  0% { opacity: 0; transform: translateY(40px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ========== INTERACTIVE HINTS & GUIDANCE ========== */
@keyframes hintPulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.05); opacity: 0.9; }
}

@keyframes hintGlow {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 16px 4px var(--accent-glow); }
}

@keyframes hintSlideLeft {
  0%, 100% { transform: translateX(0); opacity: 0.6; }
  50% { transform: translateX(-4px); opacity: 1; }
}

@keyframes fingerBounce {
  0%, 100% { transform: translateY(0) rotate(-15deg); }
  50% { transform: translateY(-5px) rotate(-15deg); }
}

@keyframes choiceArrowBounce {
  0%, 100% { transform: translateX(0); opacity: 0; }
  30% { opacity: 0.8; }
  70% { opacity: 0.8; }
  100% { transform: translateX(6px); opacity: 0; }
}

/* Choice block hint */
.choice-block::before {
  content: '▼ 请做出你的选择';
  display: block;
  font-size: 0.8rem;
  color: var(--accent-gold);
  margin-bottom: 0.8rem;
  padding: 5px 12px;
  background: var(--accent-gold-dim);
  border-radius: 3px;
  animation: hintPulse 2.5s ease-in-out infinite;
  letter-spacing: 0.1em;
  text-align: center;
  border: 1px solid rgba(201,162,76,0.1);
}

.choice-block.answered::before {
  content: '✓ 已选择';
  color: var(--accent-gold);
  background: var(--accent-gold-dim);
  animation: none;
}

/* Choice buttons hint arrow */
.choice-btn:not(.selected)::after {
  content: '→';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent-gold);
  font-size: 0.9rem;
  animation: choiceArrowBounce 2s ease-in-out infinite;
  pointer-events: none;
}

.choice-btn {
  position: relative;
  overflow: hidden;
}

.choice-btn:not(.selected):hover::after {
  animation: none;
  opacity: 0;
}

/* Click-trigger hint */
.click-trigger-hint {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.click-trigger-hint .hint-finger {
  display: inline-block;
  font-size: 1.1rem;
  animation: fingerBounce 1.5s ease-in-out infinite;
}

.click-trigger-hint::after {
  content: '— 点击此处 —';
  display: block;
  font-size: 0.8rem;
  color: var(--accent-gold);
  margin-top: 0.5rem;
  animation: hintPulse 2s ease-in-out infinite;
  letter-spacing: 0.12em;
}

.click-trigger-hint.triggered::after {
  display: none;
}

/* Interactive container hint */
.interactive-container > .interactive-title::after {
  content: ' [ 互动体验 ]';
  font-size: 0.65em;
  color: var(--accent-gold);
  vertical-align: middle;
  opacity: 0.7;
}

.interactive-container > .interactive-instruction {
  position: relative;
  padding-left: 1.5rem;
}

.interactive-container > .interactive-instruction::before {
  content: '👆';
  position: absolute;
  left: 0;
  top: 0;
  animation: fingerBounce 1.5s ease-in-out infinite;
  font-size: 0.85rem;
}

/* Breath start button special */
#breath-start-btn {
  animation: hintGlow 2s ease-in-out infinite;
  position: relative;
}
#breath-start-btn::before {
  content: '👆 ';
  animation: fingerBounce 1.5s ease-in-out infinite;
}

/* Bamboo scene extra hint */
.bamboo-scene::after {
  content: '👆 不断点击竹子';
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.8rem;
  color: var(--accent-gold);
  animation: hintPulse 2s ease-in-out infinite;
  white-space: nowrap;
  pointer-events: none;
}

/* Nav button hint on first chapter */
.nav-btn.has-hint::after {
  content: ' →';
  animation: hintSlideLeft 1.5s ease-in-out infinite;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 640px) {
  #chapter-view { padding: 1.2rem 1rem; }
  .chapter-header { padding: 2.5rem 0 1.5rem; }
  .quote-block { padding: 1rem 1.2rem; }
  .interactive-container { padding: 1.2rem; }
  .timeline-panel { width: 240px; bottom: 65px; left: 12px; }
  .title-buttons { flex-direction: column; gap: 1rem; }
  .btn { padding: 10px 28px; }
  .battle-scene .choice-options { gap: 0.5rem; }
  .choice-btn { padding: 0.75rem 1rem; font-size: 0.88rem; }
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

/* ========== MISC ========== */
.text-center { text-align: center; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-2 { margin-bottom: 1rem; }
.fade-in { animation: fadeInUp 0.6s ease-out; }

/* ========== SELECTION ========== */
::selection {
  background: rgba(201,162,76,0.2);
  color: var(--text-primary);
}

/* ========== FOCUS ========== */
:focus-visible {
  outline: 1px solid var(--accent-gold);
  outline-offset: 2px;
}
</style>
</head>

  // Chapter 6 - Longchang
  {

      { type: "narrative", paragraphs: [
        { text: "龙场。", class: "emphasis" },
        "贵州西北，群山万壑，瘴气弥漫。驿丞是什么？不入流的杂役头，管几个往来公文的小吏，连一间像样的房子都没有。",
        "我带着几个仆人，亲手搭了草庐。语言不通，瘴气逼人，仆从们相继病倒。我唱歌给他们听，宽慰他们，与他们同住同食。",
        "政治上的冤屈，身体上的困顿，精神上的孤独——三重压力，一起压过来。",
        "我反而静下来了。",
        { text: "无官可做，无书可读，无人可以倾诉。我唯一能做的，就是面对自己这颗心。", class: "highlight" }

      { type: "interactive", id: "longchang" },
      { type: "narrative", paragraphs: [
        { text: "理不在竹子里，不在朱子的书里，不在任何外物里。理，就在我的本性里。", class: "highlight" },

        { text: "陆九渊说「宇宙便是吾心」，他是对的。但他只点到为止，没有把这条路走通。我要把它走通。", class: "emphasis" }

      { type: "quote", text: "心即理也。天下又有心外之事、心外之理乎？\n且如事父，不成去父上求个孝的理；事君，不成去君上求个忠的理；交友、治民，不成去友上、民上求个信与仁的理。都只在此心，心即理也。", source: "《传习录·徐爱录》" }

  // Chapter 7

    scenes: [
      { type: "narrative", paragraphs: [

        "弟子们最常问的，是一个问题：知行合一，究竟是什么意思？",
        { text: "这个问题，不只是学问上的，更是实践上的——很多人知道该孝顺，却不去做；知道该诚实，却去撒谎。知和行，难道不是两件事吗？", class: "" }

      { type: "narrative", paragraphs: [

      },
      { type: "quote", text: "如好好色，如恶恶臭。见好色属知，好好色属行，只见那好色时已自好了，不是见了后又立个心去好；闻恶臭属知，恶恶臭属行，只闻那恶臭时已自恶了，不是闻了后别立个心去恶。", source: "《传习录·徐爱录》" },
      { type: "narrative", paragraphs: [
        { text: "看见美色，心里已经喜欢了——这「喜欢」就是知和行同时发生的。看见恶臭，还没等「思考」，心里已经厌恶了。", class: "highlight" },

    ]
  },

// ========== PARTICLE SYSTEM ==========
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.speedY = (Math.random() - 0.5) * 0.15 - 0.05;
    this.opacity = Math.random() * 0.2 + 0.03;
    this.life = Math.random() * 600 + 200;
    this.age = 0;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.age++;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.age > this.life) this.reset();
  }
  draw() {
    const fade = 1 - (this.age / this.life);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 160, 120, ${this.opacity * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < 40; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== CHAPTER RENDERING ==========
function navigateToChapter(index) {
  if (index < 0 || index >= chapters.length) return;

  // Clean up any running interactive timers before leaving
  if (bambooInterval) { clearInterval(bambooInterval); bambooInterval = null; }

  state.currentChapter = index;
  state.visitedChapters.add(index);
  updateProgress();
  updateTimeline();
  renderChapter(chapters[index]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Close timeline if open
  document.getElementById('timeline-panel').classList.remove('open');
}

function renderChapter(chapter) {
  const view = document.getElementById('chapter-view');
  view.classList.add('active');
  view.style.animation = 'chapterTransition 0.6s ease-out';

  // Build pages: split scenes into pages
  const pages = buildPages(chapter);
  state.totalPages = pages.length;
  state.currentPage = 0;

  let html = `
    <div class="chapter-header">
      <div class="chapter-number">第${chapter.id}章</div>
      <h2 class="chapter-title">${chapter.title}</h2>
      <div class="chapter-era">${chapter.era}</div>
      <div class="chapter-divider"></div>
    </div>
    <div class="chapter-illustration">${getChapterIllustration(chapter.id)}</div>
    <div class="scene-content" id="scene-content">
      <div class="page-content" id="page-content">
  `;

  pages[0].scenes.forEach((scene, si) => {
    html += renderScene(scene, si);
  });

  html += `</div>`;

  html += `</div>`;

  // Store pages data for goToPage
  state._pages = pages;

  html += `</div>`;
  html += renderNav(chapter.id);

  view.innerHTML = html;

  // Trigger narrative block visibility
  setTimeout(() => {
    const blocks = view.querySelectorAll('#page-content .narrative-block');
    blocks.forEach((block, i) => {
      setTimeout(() => block.classList.add('visible'), i * 300);
    });
    // Init interactive scenes (only for current page)
    initInteractiveForScenes(pages[0].scenes);
  }, 100);
}

// Split chapter scenes into pages
function buildPages(chapter) {
  const scenes = chapter.scenes;
  const pages = [];
  let current = [];
  const perPage = 3; // max scenes per page

  for (let i = 0; i < scenes.length; i++) {
    const s = scenes[i];
    current.push(s);
    // Interactive and choice scenes start a new page if current page already has content
    const isInteractive = s.type === 'interactive';
    const needsNewPage = current.length >= perPage || (isInteractive && current.length > 1);
    if (needsNewPage || i === scenes.length - 1) {
      pages.push({ scenes: [...current], isFirst: pages.length === 0 });
      current = [];
    }
  }
  // Handle leftover
  if (current.length > 0) {
    // Merge into last page if it's small enough
    if (pages.length > 0 && pages[pages.length - 1].scenes.length <= 2) {
      pages[pages.length - 1].scenes.push(...current);
    } else {
      pages.push({ scenes: [...current], isFirst: pages.length === 0 });
    }
  }

  // Mark pages that need decoration image
  pages.forEach((pg, idx) => {
    pg.needsDeco = !pg.isFirst && idx > 0;
  });

  return pages.length > 0 ? pages : [{ scenes: [], isFirst: true, needsDeco: false }];
}

function goToPage(pageIndex) {
  if (pageIndex < 0 || pageIndex >= state.totalPages) return;
  state.currentPage = pageIndex;

  const chapter = chapters[state.currentChapter];
  const pages = state._pages || buildPages(chapter);
  const pageScenes = pages[pageIndex].scenes;
  const page = pages[pageIndex];

  const contentEl = document.getElementById('page-content');

  // Phase 1: Fade out current content
  contentEl.classList.add('fade-out');

  setTimeout(() => {
    // Phase 2: Replace content
    let html = '';
    if (page.needsDeco) {
      const deco = getSceneDecoration(chapter.id);
      if (deco) html += `<div class="scene-image">${deco}</div>`;
    }
    pageScenes.forEach((scene, si) => {
      html += renderScene(scene, si);
    });
    contentEl.innerHTML = html;

    // Phase 3: Fade in new content
    contentEl.classList.remove('fade-out');
    contentEl.classList.remove('page-content');
    void contentEl.offsetWidth;
    contentEl.classList.add('page-content');

    // Update unified nav
    const navEl = document.querySelector('.unified-nav');
    if (navEl) {
      navEl.outerHTML = renderNav(chapter.id);
    }

    // Trigger narrative animations
    setTimeout(() => {
      const blocks = contentEl.querySelectorAll('.narrative-block');
      blocks.forEach((block, i) => {
        setTimeout(() => block.classList.add('visible'), i * 250);
      });
      initInteractiveForScenes(pageScenes);
    }, 150);

    // Scroll to scene-content top
    const sceneContent = document.getElementById('scene-content');
    if (sceneContent) {
      sceneContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 200);
}

function initInteractiveForScenes(scenes) {
  scenes.forEach(scene => {
    if (scene.type === 'interactive') {
      switch (scene.id) {
        case 'bamboo': initBamboo(); startBamboo(); break;
        case 'longchang': /* wait for user click */ break;
        case 'battle':
          battlePhase = 0; battleScore = 0;
          break;
        case 'mirror':
          mirrorPhase = 0; mirrorScore = 0; mirrorAnswers = [];
          break;
        case 'ending': initEnding(); break;
      }
    }
  });
}

function renderScene(scene, index) {
  switch (scene.type) {
    case 'narrative':
      return scene.paragraphs.map((p, i) => {
        const text = typeof p === 'string' ? p : p.text;
        const cls = typeof p === 'string' ? '' : (p.class || '');
        return `<div class="narrative-block" style="animation-delay: ${index * 0.1 + i * 0.2}s">
          <p class="narrative-text ${cls}">${text}</p>
        </div>`;
      }).join('');

    case 'quote':
      const noteHtml = scene.note ? `<p class="quote-note">${scene.note}</p>` : '';
      return `<div class="quote-block" style="animation-delay: ${index * 0.1}s">
        <p class="quote-text">${scene.text.replace(/\n/g, '<br>')}</p>
        <p class="quote-source">—— ${scene.source}</p>
        ${noteHtml}
      </div>`;

    case 'choice':
      return `<div class="choice-block" style="animation-delay: ${index * 0.1}s">
        <div class="choice-prompt">${scene.prompt}</div>
        <div class="choice-options" data-choice-id="${scene.record}">
          ${scene.options.map((opt, oi) => `
            <button class="choice-btn" data-alignment="${opt.alignment}" data-index="${oi}" onclick="makeChoice(this, '${scene.record}', ${opt.alignment})">${opt.text}</button>
          `).join('')}
        </div>
        <div class="choice-feedback" id="feedback-${scene.record}"></div>
      </div>`;

    case 'interactive':
      return renderInteractive(scene.id, index);

    case 'click-trigger':
      return `<div class="narrative-block text-center" style="animation-delay: ${index * 0.1}s">
        <div class="click-trigger-hint" style="color: var(--accent); font-size: 1.1rem;" onclick="triggerClickHint(this, '${scene.reveal.replace(/'/g, "\\'")}')">
          <span class="hint-finger">👆</span>
          <span class="narrative-text">${scene.text}</span>

      </div>`;

    default:
      return '';
  }
}

// Unified navigation: merges page-nav and chapter-nav into one bar
function renderNav(chapterId) {
  const chapter = chapters[state.currentChapter];
  const pages = state._pages || [{ scenes: [] }];
  const totalPages = pages.length;
  const curPage = state.currentPage;
  const isLastPage = curPage >= totalPages - 1;
  const isFirstPage = curPage === 0;
  const isFirstChapter = chapterId <= 1;
  const isLastChapter = chapterId >= chapters.length;

  // Left button: "上一章" if first page, "上一页" otherwise
  let leftBtn = '';
  if (!isFirstPage) {
    leftBtn = `<button class="nav-btn" onclick="goToPage(${curPage - 1})">← 上一页</button>`;
  } else if (!isFirstChapter) {
    leftBtn = `<button class="nav-btn" onclick="navigateToChapter(${chapterId - 2})">← 上一章</button>`;
  } else {
    leftBtn = `<button class="nav-btn" style="visibility:hidden">← 上一章</button>`;
  }

  // Right button: "下一章" if last page (and has next chapter), "下一页" otherwise
  let rightBtn = '';
  if (!isLastPage) {
    rightBtn = `<button class="nav-btn" onclick="goToPage(${curPage + 1})">下一页 →</button>`;
  } else if (!isLastChapter) {
    rightBtn = `<button class="nav-btn" onclick="navigateToChapter(${chapterId})">下一章 →</button>`;
  } else {
    rightBtn = `<button class="nav-btn" style="visibility:hidden">下一章 →</button>`;
  }

  // Dots (only show if multi-page)
  let dotsHtml = '';
  if (totalPages > 1) {
    dotsHtml = '<div class="nav-dots">';
    for (let i = 0; i < totalPages; i++) {
      dotsHtml += `<div class="nav-dot ${i === curPage ? 'active' : ''}" onclick="goToPage(${i})"></div>`;
    }
    dotsHtml += '</div>';
  } else {
    dotsHtml = '<div class="nav-info"><span class="chapter-indicator">' + chapterId + ' / ' + chapters.length + '</span></div>';
  }

  // Page label under dots
  let pageLabel = totalPages > 1
    ? `<span class="nav-page-label">第${chapterId}章 · ${curPage + 1}/${totalPages}</span>`
    : '';

  return `<div class="unified-nav">
    ${leftBtn}
    <div class="nav-info">
      ${dotsHtml}
      ${pageLabel}
    </div>
    ${rightBtn}
  </div>`;
}

// ========== CHOICES ==========
function makeChoice(btn, recordId, alignment) {
  const container = btn.closest('.choice-options');
  if (container.dataset.answered) return;
  container.dataset.answered = 'true';

  state.mindScore += alignment;
  state.choices.push({ record: recordId, alignment: alignment, text: btn.textContent });

  btn.classList.add('selected');
  container.querySelectorAll('.choice-btn').forEach(b => {
    if (b !== btn) b.style.opacity = '0.4';
    b.style.pointerEvents = 'none';
  });

  // Mark choice block as answered
  const choiceBlock = btn.closest('.choice-block');
  if (choiceBlock) choiceBlock.classList.add('answered');

  const chapter = chapters[state.currentChapter];
  const scene = chapter.scenes.find(s => s.type === 'choice' && s.record === recordId);
  const opt = scene.options.find(o => o.text === btn.textContent);
  if (opt && opt.feedback) {
    const fb = document.getElementById(`feedback-${recordId}`);
    fb.textContent = opt.feedback;
    fb.classList.add('show');
  }
}

function triggerClickHint(wrapper, revealText) {
  const finger = wrapper.querySelector('.hint-finger');
  const textEl = wrapper.querySelector('.narrative-text');
  if (finger) finger.style.display = 'none';
  if (textEl) {
    textEl.textContent = revealText;
    textEl.style.color = 'var(--text-primary)';
    textEl.style.cursor = 'default';
    textEl.classList.add('emphasis');
  }
  // Remove the ::after hint by adding a class
  wrapper.classList.add('triggered');
  // Remove wrapper's own after via inline style override
  wrapper.style.setProperty('--after-display', 'none');
}

function clickBamboo(event) {

  const words = ['竹节', '青色', '中空', '叶子', '根须', '纹路', '气味', '露水', '光影', '风声', '……', '还是竹子', '没有道理'];

function doBreathCycle() {
  const circle = document.getElementById('breath-circle');
  const text = document.getElementById('breath-text');

  if (breathCount >= 3) {
    circle.style.display = 'none';
    text.style.display = 'none';

  // 吸气 4秒

  circle.style.transform = 'scale(1.5)';

    text.textContent = '屏息……';
    circle.style.transition = 'border-color 0.5s, box-shadow 0.5s';
    circle.className = 'breath-circle hold';

      <p><span style="color: var(--accent)">不妨回到格竹的那个下午，重新开始。这一次，不要看竹子，看自己的心。</span></p>`;
  }

  let reviewHtml = '';
  state.choices.forEach(c => {
    const optClass = c.alignment >= 5 ? 'color: var(--accent)' : c.alignment <= -3 ? 'color: var(--text-muted)' : '';
    reviewHtml += `<div class="review-item">
      <span class="review-chapter">${c.record}</span>
      <span class="review-choice" style="${optClass}">${c.text}</span>
    </div>`;
  });

  scene.innerHTML = `
    <div class="ending-review">
      <h3 style="font-family: var(--font-title); font-size: 1.3rem; color: var(--accent); margin-bottom: 1.5rem; letter-spacing: 0.1em;">人生回顾</h3>

    <div class="final-quote">此心光明，亦复何言。</div>
    <button class="btn btn-primary restart-btn" onclick="restartGame()">重新体验</button>
  `;
}

function restartGame() {
  state.currentChapter = -1;
  state.mindScore = 50;
  state.choices = [];
  state.interactiveStates = {};
  state.visitedChapters.clear();
  navigateToChapter(0);
}

// ========== PROGRESS ==========
function updateProgress() {
  const pct = ((state.currentChapter + 1) / chapters.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ========== TIMELINE ==========
function buildTimeline() {
  const panel = document.getElementById('timeline-panel');
  let html = '';
  chapters.forEach((ch, i) => {
    html += `<div class="timeline-item" id="tl-${i}" onclick="navigateToChapter(${i}); toggleTimeline();">
      <div class="timeline-dot"></div>
      <div class="timeline-label">
        <div class="tl-title">第${ch.id}章 · ${ch.title}</div>
        <div class="tl-year">${ch.era}</div>
      </div>
    </div>`;
  });
  panel.innerHTML = html;
}

function updateTimeline() {
  chapters.forEach((_, i) => {
    const el = document.getElementById(`tl-${i}`);
    el.className = 'timeline-item';
    if (i === state.currentChapter) el.classList.add('current');
    else if (state.visitedChapters.has(i)) el.classList.add('visited');
  });
}

function toggleTimeline() {
  document.getElementById('timeline-panel').classList.toggle('open');
}

function inkwashDefs(suffix) {
  // Unified ink-wash filter & gradient defs — shared by all illustrations
  const s = suffix || '';
  return `<defs>
    <!-- 宣纸纹理 -->
    <filter id="paperTex${s}" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="2" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="texBlend"/>
      <feComponentTransfer in="texBlend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- 水墨晕染（轻微） -->
    <filter id="inkBleed${s}" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="5" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- 墨色浓淡（增加对比和古意） -->
    <filter id="inkSepia${s}" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix"
        values="0.35 0.30 0.25 0 0.05
                0.30 0.28 0.22 0 0.03
                0.22 0.20 0.18 0 0.01
                0.00 0.00 0.00 1 0"/>
    </filter>
    <!-- 远山淡雾 -->
    <filter id="mist${s}" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- 近山清晰 -->
    <filter id="mistNear${s}" x="0" y="0" width="100%" height="100%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>`;
}

// 通用水墨装饰元素 — 远山、近山、云雾

}

// 通用云雾
function inkClouds(s) {
  const inkLt = s.inkLt || '#9a8e80';
  const wash  = s.wash  || '#c8bfb0';
  let r = '';
  r += `<ellipse cx="120" cy="85" rx="70" ry="18" fill="${inkLt}" opacity="0.04" filter="url(#mist)"/>`;

// 通用留白印章角标
function inkSeal(s) {
  const red = s.red || '#b33a2a';

    // ===== Chapter 3: 少年立志 — 第一等事 =====

    // ===== Chapter 11: 虔州论学 — 人人皆有圣人 =====
    11: `<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
